<div class="controls">
    <mat-button-toggle-group
        [value]="gridSize()"
        (change)="onGridChange($event)"
        hideSingleSelectionIndicator
        aria-label="Grid size"
    >
        @for (size of gridOptions; track size) {
            <mat-button-toggle [value]="size">{{ size }}×{{ size }}</mat-button-toggle>
        }
    </mat-button-toggle-group>

    <div class="image-selector">
        <button mat-icon-button [disabled]="imageCount <= 1" (click)="prevImage()" aria-label="Previous image">
            <mat-icon>chevron_left</mat-icon>
        </button>
        <span class="image-counter">{{ imageIndex() + 1 }} / {{ imageCount }}</span>
        <button mat-icon-button [disabled]="imageCount <= 1" (click)="nextImage()" aria-label="Next image">
            <mat-icon>chevron_right</mat-icon>
        </button>
    </div>

    <button mat-stroked-button (click)="newGame()">New Game</button>

    <span class="move-count" aria-live="polite" aria-atomic="true">Moves: {{ moveCount() }}</span>
</div>

<div
    class="grid"
    role="group"
    [attr.aria-label]="gridSize() + '×' + gridSize() + ' slide puzzle'"
    [style.grid-template-columns]="'repeat(' + gridSize() + ', 1fr)'"
    [style.grid-template-rows]="'repeat(' + gridSize() + ', 1fr)'"
>
    @for (tile of tiles(); track $index; let i = $index) {
        @if (tile !== null) {
            <button
                class="tile"
                [ngStyle]="getTileStyle(tile)"
                (click)="onTileClick(i)"
                [attr.aria-label]="getTileLabel(tile, i)"
                [disabled]="!canMove(i)"
            ></button>
        } @else {
            <div class="tile blank" aria-hidden="true"></div>
        }
    }
</div>

@if (isSolved()) {
    <div class="solved-banner" role="status">
        Solved in {{ moveCount() }} moves!
    </div>
}
